name: PulseOps AI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Setup Node environment for React build check
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Verify Frontend Compilation
      run: |
        cd frontend
        npm run build

    # 3. Setup Python environment for backend verification
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install Backend Dependencies
      run: |
        pip install -r backend/requirements.txt

    # FIX (Bug #4): py_compile only checks syntax, not whether imports resolve.
    # A broken/renamed import in pipeline.py, decision_engine.py, or gemini.py
    # would pass the old check and only fail after deploy. This actually
    # imports the FastAPI app object, which forces Python to resolve every
    # import main.py depends on. Dummy env vars are provided so pydantic-settings
    # doesn't fail on missing required config in a CI sandbox.
    - name: Verify Backend Imports Resolve
      env:
        PYTHONPATH: ${{ github.workspace }}
        GEMINI_API_KEY: dummy-ci-key
        GCP_PROJECT_ID: dummy-ci-project
        DATASET_PROFILE: SMALL
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from backend.app.main import app
        print('Import check passed:', app.title)
        "

    - name: Run Test Suite
      env:
        PYTHONPATH: ${{ github.workspace }}
        GEMINI_API_KEY: dummy-ci-key
        GCP_PROJECT_ID: dummy-ci-project
        DATASET_PROFILE: SMALL
      run: |
        if [ -d "backend/tests" ] || [ -d "tests" ]; then
          pytest -q
        else
          echo "No tests directory found yet — skipping pytest run."
        fi

